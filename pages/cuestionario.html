<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Viajamos | Cuestionario</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body>
  <header class="border-bottom bg-white">
    <nav class="navbar container">
      <a class="navbar-brand fw-semibold" href="../index.html">🌍 Viajamos</a>
    </nav>
  </header>

  <main class="container py-4">
    <div id="avisos"></div>

    <section class="col-12 col-lg-8 mx-auto card border-0 sombra-suave">
      <div class="card-body p-4">
        <h1 class="h4">Cuestionario</h1>
        <p class="text-secondary">solo preferencias clave.</p>

        <form id="formulario" class="d-grid gap-3 mt-3">
          <div>
            <label for="tipo" class="form-label">Tipo de destino</label>
            <select id="tipo" class="form-select" required>
              <option value="">Selecciona</option>
              <option value="playa">Playa</option>
              <option value="ciudad">Ciudad</option>
              <option value="montana">Montaña</option>
              <option value="rural">Rural</option>
            </select>
          </div>

          <div>
            <label for="ritmo" class="form-label">Ritmo de viaje</label>
            <select id="ritmo" class="form-select" required>
              <option value="">Selecciona</option>
              <option value="tranquilo">Tranquilo</option>
              <option value="equilibrado">Equilibrado</option>
              <option value="activo">Activo</option>
            </select>
          </div>

          <div>
            <label for="clima" class="form-label">Clima</label>
            <select id="clima" class="form-select" required>
              <option value="">Selecciona</option>
              <option value="calido">Cálido</option>
              <option value="templado">Templado</option>
              <option value="frio">Frío</option>
            </select>
          </div>

          <div>
            <label for="presupuesto" class="form-label">Presupuesto</label>
            <select id="presupuesto" class="form-select" required>
              <option value="">Selecciona</option>
              <option value="economico">Económico</option>
              <option value="medio">Medio</option>
              <option value="alto">Alto</option>
            </select>
          </div>

          <div class="d-flex gap-2">
            <button class="btn btn-primary" type="submit">Recomendar</button>
            <a class="btn btn-outline-secondary" href="./recomendacion.html">Ver recomendación</a>
          </div>
        </form>
      </div>
    </section>
  </main>

  <footer class="mt-5 py-3 border-top bg-white">
    <div class="container text-center small text-secondary">2º DAW · I.E.S. Gregorio Prieto · Proyecto Individual · Luis Miguel</div>
  </footer>

  <script type="module" src="../assets/js/app.js"></script>
</body>
</html>
